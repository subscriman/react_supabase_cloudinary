# A string used to distinguish different Supabase projects on the same machine.
project_id = "subscription-manager"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "https://arttomato-web.vercel.app"
additional_redirect_urls = [
  "https://arttomato-web.vercel.app/auth/callback",
  "https://arttomato-web.vercel.app/auth/callback?next=/mypage",
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/auth/callback?next=/mypage"
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "1m0s"
otp_length = 8

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true
